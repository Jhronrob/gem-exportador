name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Update version
        run: (Get-Content gradle.properties) -replace 'app.version=.*', "app.version=${{ steps.get_version.outputs.VERSION }}" | Set-Content gradle.properties
        shell: pwsh

      - name: Ensure NSIS is in PATH
        run: |
          if (Test-Path "C:\Program Files (x86)\NSIS\makensis.exe") {
            echo "C:\Program Files (x86)\NSIS" | Out-File -Append -FilePath $env:GITHUB_PATH
            Write-Host "NSIS found and added to PATH"
          } else {
            choco install nsis -y --no-progress
            Write-Host "NSIS installed via Chocolatey"
          }
        shell: pwsh

      - name: Build NSIS Installer
        run: ./gradlew buildNsisInstaller --parallel --build-cache -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseParallelGC"
        shell: bash

      - name: Create version.json
        run: |
          $installer = "GemExportador-${{ steps.get_version.outputs.VERSION }}-setup.exe"
          $content = "{`"version`":`"${{ steps.get_version.outputs.VERSION }}`",`"downloadUrl`":`"https://github.com/${{ github.repository }}/releases/download/v${{ steps.get_version.outputs.VERSION }}/$installer`",`"releaseNotes`":`"Versao ${{ steps.get_version.outputs.VERSION }}`",`"mandatory`":false}"
          $content | Out-File -FilePath version.json -Encoding utf8NoBOM
        shell: pwsh

      - name: Update Gist with version.json
        run: |
          $content = Get-Content version.json -Raw
          $escaped = $content.Trim() -replace '\\', '\\\\' -replace '"', '\"' -replace "`n", '\n' -replace "`r", ''
          $body = "{`"files`":{`"version.json`":{`"content`":`"$escaped`"}}}"
          Invoke-RestMethod `
            -Uri "https://api.github.com/gists/c6b0d49af57e8869284b86bc45df8519" `
            -Method Patch `
            -Headers @{ Authorization = "token ${{ secrets.GIST_TOKEN }}"; "User-Agent" = "github-actions" } `
            -Body $body `
            -ContentType "application/json"
          Write-Host "Gist atualizado com versao ${{ steps.get_version.outputs.VERSION }}"
        shell: pwsh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktopApp/build/compose/binaries/main/nsis/*.exe
            version.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
